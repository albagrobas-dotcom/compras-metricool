<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Compras · Metricool</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; background: #f7f8fc; }
      #login-screen {
        min-height: 100vh; display: flex; align-items: center;
        justify-content: center; flex-direction: column; gap: 24px;
      }
      .login-card {
        background: white; border-radius: 14px; padding: 48px 40px;
        box-shadow: 0 10px 25px rgba(0,0,0,.1); text-align: center;
        max-width: 400px; width: 94%;
      }
      .login-logo {
        width: 48px; height: 48px; background: linear-gradient(135deg,#7c3aed,#5b21b6);
        border-radius: 12px; display: flex; align-items: center; justify-content: center;
        font-size: 22px; font-weight: 800; color: white; margin: 0 auto 20px;
      }
      .login-title { font-size: 20px; font-weight: 800; color: #111827; margin-bottom: 8px; }
      .login-sub { font-size: 13px; color: #6b7280; margin-bottom: 32px; }
      .login-error {
        background: #fee2e2; color: #ef4444; border-radius: 8px;
        padding: 10px 16px; font-size: 13px; margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // ── Configuración ──────────────────────────────────────────────
      window.SCRIPT_URL   = "https://script.google.com/macros/s/AKfycbwdIcd8LiY_oP-lwc7OanpLHkncA9ik7GYpsbNAF6ex5qIeSUy-4glCTlOas4vx9e8/exec";
      window.GOOGLE_CLIENT_ID = "PEGA_AQUI_TU_GOOGLE_CLIENT_ID";
      // ───────────────────────────────────────────────────────────────
    </script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
